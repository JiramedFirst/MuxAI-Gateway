spring:
  application:
    name: muxai-gateway
  threads:
    virtual:
      enabled: true
  config:
    import:
      - optional:file:./config/providers.yml
      - optional:classpath:providers.yml
  lifecycle:
    # Give in-flight requests up to 30s to finish after SIGTERM before the JVM exits.
    # Works alongside `server.shutdown: graceful`.
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  # Let in-flight requests finish after SIGTERM instead of cutting them mid-stream.
  # Kubernetes / docker-compose / systemd all deliver SIGTERM on stop; 30s
  # matches a typical terminationGracePeriodSeconds default.
  shutdown: graceful
  tomcat:
    connection-timeout: 180s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      # Show component details (including the provider inventory added by
      # ProvidersHealthIndicator) so operators can verify config from curl.
      show-details: always
      show-components: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,providers
  metrics:
    distribution:
      percentiles-histogram:
        muxai.provider.call: true

logging:
  level:
    com.muxai.gateway: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# MuxAI full-version knobs. Everything below is off by default so a zero-delta
# upgrade keeps Phase 1 behaviour — flip each switch as you opt into the
# corresponding feature.
muxai:
  pii:
    enabled: false
    email: true
    phone: true
    credit-card: true
    ssn: true
    ipv4: false

  cache:
    # Exact-match response cache for deterministic (temperature=0) chat requests.
    # Turn on when you have repeated prompts — e.g. boilerplate evals — where a
    # cache hit saves the provider round-trip. Streaming and tool-enabled requests
    # bypass the cache regardless of this flag.
    enabled: false
    max-entries: 10000
    ttl-seconds: 3600
    max-cacheable-temperature: 0.0

  hot-reload:
    # When enabled, providers.yml is re-parsed on mtime change and API keys,
    # routes, and rate-limit entries swap in without restart. Provider structure
    # changes (new backend, new base-url, retype) still need a restart.
    enabled: false
    path: ./config/providers.yml
    interval-ms: 5000

  rate-limit:
    # Future-forward: "redis" would share token buckets across replicas for
    # horizontally-scaled deployments. Only "memory" ships today; selecting
    # anything else falls back to memory with a warning.
    backend: memory
    redis:
      host: localhost
      port: 6379
      key-prefix: "muxai:ratelimit:"
